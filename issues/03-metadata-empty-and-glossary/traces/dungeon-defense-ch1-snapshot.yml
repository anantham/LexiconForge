    - generic [ref=e285]: Translated in 115.97s with gpt-5 (~$0.06623)
    - generic [ref=e289]:
      - generic [ref=e291]: "\"Stop that bastard!\""
      - generic [ref=e293]: Gaudy sorcery hammered the earth like a smith’s maul. The demons were struck dumb.
      - generic [ref=e295]: A myth was being reenacted. A rain of magic—no, of cannon fire—kept sweeping the battlefield. The ground shook. The field commissar whipped the soldiers’ backs raw as he screamed. Stop that bastard.
      - generic [ref=e297]: But how, exactly, were they supposed to stop him?
      - generic [ref=e299]: "\"C-Captain. The enemy’s too fierce.\""
      - generic [ref=e301]: "\"They’ve already broken through our second line… The Minotaur corps is annihilated!\""
      - generic [ref=e303]: Every fiend on that field was elite. However hopeless the tide, they could still force themselves forward. Yet even elite demonkind recoiled from the sight before them.
      - generic [ref=e305]: One human was sprinting straight through the heart of the downpour of spells. As if tearing down a grand boulevard. Unbothered by the baptism of magic and arrows, the human swung a greatsword. Each time the blade flashed, a dozen elite fiends spilled their guts and crumpled.
      - generic [ref=e307]: To lay down their lives? Gladly. To be sacrificed for victory? They accepted it without complaint.
      - generic [ref=e309]: But—stopping that human was absolutely impossible.
      - generic [ref=e311]: "\"You spineless shits. And you dare call yourselves His Majesty the Overlord’s army!\""
      - generic [ref=e313]: The commissar beheaded one of his own men. He’d killed more allies than enemies in his lifetime.
      - generic [ref=e315]: "\"Fight! If you’re gonna die, at least stick a spear in him once before you go!\""
      - generic [ref=e317]: He brandished his halberd and bellowed himself hoarse. The demon soldiers filled with venom. Shoulder to shoulder, line to line, they advanced a step at a time.
      - generic [ref=e319]: "\"Shit! You die once, not twice!\""
      - generic [ref=e321]: "\"Take that monster bastard’s head and it’s over! Show demonkind’s pride!\""
      - generic [ref=e323]: "\"Krugh! Khugh! Khula, krugh!\""
      - generic [ref=e325]: With their guttural, inhuman battle cries, the demon soldiers charged.
      - generic [ref=e327]: They, too, had families. Convictions. Their faces were different, but they were no different from humans. Knowing they would die and stepping forward anyway—the courage in that step was the same. Which made it all the more hollow.
      - generic [ref=e329]: That they had no fate left but to die by my hand.
      - generic [ref=e331]: Was it because I was overwhelmingly strong? To begin with—yes. I was strong. I had no wish to pretend otherwise.
      - generic [ref=e333]: But between them and me lay a chasm no bridge could span. No matter how bravely they stepped, no matter how they went mad watching a comrade’s head scatter from his shoulders like chaff, they died screaming on the edge of my blade.
      - generic [ref=e337]:
        - paragraph [ref=e338]: No image yet for ILLUSTRATION-1.
        - button "▶ Image generation controls — A lone human warrior sprinting down the center of ..." [ref=e340]:
          - generic [ref=e341]: ▶
          - generic [ref=e342]: Image generation controls
          - generic [ref=e343]: — A lone human warrior sprinting down the center of ...
      - generic [ref=e345]: At last.
      - generic [ref=e347]: "\"Ghh! That I, Baal, should die to a mere human…!\""
      - generic [ref=e349]: The Great Demon King Baal’s dungeon was breached in the blink of an eye—the place that had steeped the continent in terror.
      - generic [ref=e351]: With a thick, sinking thud, my chill greatsword tunneled into the Demon King’s heart.
      - generic [ref=e353]: "\"Rest easy, Demon King.\""
      - generic [ref=e355]: I looked down on Baal.
      - generic [ref=e357]: The demon once hailed as the world’s nightmare, the unprecedented Great Demon King, was dying. The grand labyrinth of one hundred and twenty floors had been reduced to a slightly oversized mass grave.
      - generic [ref=e359]: "\"You were, without doubt, my greatest foe.\""
      - generic [ref=e361]: "\"…\""
      - generic [ref=e363]: "\"As one warrior to another, I salute you.\""
      - generic [ref=e365]: "\"Kh…\""
      - generic [ref=e367]: Baal managed a wry smile.
      - generic [ref=e369]: "\"So. There are still humans who keep their pride.\""
      - generic [ref=e371]: "\"No.\" I shook my head."
      - generic [ref=e373]: "\"You forced us humans to keep it. That’s how strong you were.\""
      - generic [ref=e375]: "\"Ha! Then my five thousand years were not in vain… I reached beyond the limits of my race and drove conviction into humankind. As a mortal, what more could I desire? Has any demon ever achieved as much? No. None will ever…\""
      - generic [ref=e377]: Baal closed his eyes.
      - generic [ref=e379]: "\"Not a bad life.\""
      - generic [ref=e381]: Born a lowly lesser demon, he conquered the demon realm. A sovereign who even set his sights on the human world ended his life.
      - generic [ref=e383]: I bowed deeply to the fallen monarch.
      - generic [ref=e385]: A moment later, a band of figures came rushing up around me. The archmage, the knight-captain, the master thief, the saintess—companions who’d shared twenty years of hardship and victory at my side.
      - generic [ref=e387]: "\"You little punk!\""
      - generic [ref=e389]: The knight barreled into me and locked me in a headlock. "Ow—ow! That hurts, damn it!" I yelled, but he was relentless. He’d been tumbling across the battlefield for nearly ten hours as well. Where he found that kind of strength, I had no idea.
      - generic [ref=e391]: "\"Congratulations, Lorita.\""
      - generic [ref=e393]: While we two men roughhoused, three women approached.
      - generic [ref=e395]: "\"Heh. You really went and cracked Baal’s dungeon. Not bad.\""
      - generic [ref=e397]: "\"What are you even saying? I was sure from the start you’d do it, Lord Lorita. With the Twelve Gods’ blessing besides.\""
      - generic [ref=e399]: The knight pouted and grumbled.
      - generic [ref=e401]: "\"Yeah, yeah. Keep talking like this brat took the Demon King’s castle all by himself. As if a widower like me gets to just go dungeon-crawling for kicks—tch.\""
      - generic [ref=e403]: Everyone but the knight laughed. With a face like he’d spent a decade holed up in the backwoods wrestling bears as his next-door neighbors, how could we not?
      - generic [ref=e405]: Watching that scene from a little way off, it finally sank in.
      - generic [ref=e407]: Ah. It’s over.
      - generic [ref=e409]: I really did it. I cleared Baal’s dungeon.
      - generic [ref=e411]: News of the Great Demon King’s death slammed into the continent. Every human, high or low, cheered.
      - generic [ref=e413]: They’d been waiting for the day the human world would fall. Dozens of legions had marched to topple the Demon King’s citadel; all had been annihilated. Most people had let go of hope. And then a hero’s party led adventurers and mercenaries to slay the Great Demon King.
      - generic [ref=e415]: The birth of a hero!
      - generic [ref=e417]: Festivals ran day and night for ten days across the continent. Since the demons spread plague over the land twenty years ago, anywhere humans lived had been like one long wake. Those days were hellish. Now the nightmare was over. Humanity partied, as if to claim recompense for the last twenty years.
      - generic [ref=e419]: Toasts and laughter scattered over the city skies. There was a desperate edge to it. Naturally. There were those who’d never be repaid no matter how much the world celebrated. Too many had crossed a river they could never return from. People laughed, then wept, then went right back to laughing…
      - generic [ref=e421]: "\"Adventurer Lorita.\""
      - generic [ref=e423]: The Empress herself attended the festivities to honor the hero. Not only the Empress. The rulers of all twelve nations that governed the human world were present. Each, in turn, paid homage to the great hero.
      - generic [ref=e425]: "\"You have, in small, slain the Demon King, and in great, saved mankind. How could the high kings of the continent not offer you thanks? Lorita. While you live, you shall be revered by all; when you die, your name shall endure forever.\""
      - generic [ref=e427]: The Empress knelt. She offered me a sword in both hands. At the same time, the other sovereigns knelt with her.
